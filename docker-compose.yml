version: "3.8"
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: myfinance
      POSTGRES_PASSWORD: myfinance
      POSTGRES_DB: myfinance
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
volumes:
  pgdata:
